apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "falcon-sensor-cleanup.fullname" . }}-access-role
  labels:
    app: {{ include "falcon-sensor-cleanup.name" . }}
    app.kubernetes.io/name: {{ include "falcon-sensor-cleanup.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: "kernel_sensor"
    crowdstrike.com/provider: crowdstrike
    helm.sh/chart: {{ include "falcon-sensor-cleanup.chart" . }}
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - secrets
  - pods
  - services
  - nodes
  - daemonsets
  verbs:
  - get
  - watch
  - list
